<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mario Münz-Digitalisierer</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:linear-gradient(#5cc8ff,#87ceeb);
    text-align:center;
    overflow:hidden;

    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    color:white;
    text-shadow:3px 3px #000;
    margin:20px 10px;
    font-size:clamp(2rem,6vw,3.5rem);
}

button{
    font-size:1.3rem;
    padding:18px 28px;
    border:4px solid black;
    border-radius:12px;
    background:#ff4444;
    color:white;
    cursor:pointer;
    box-shadow:4px 4px 0 black;
    min-height:64px;
}

button:active{
    transform:scale(0.97);
}

#coins{
    width:min(95vw,700px);

    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;

    margin-top:30px;
    min-height:200px;
}

.coin{
    width:70px;
    height:70px;
    object-fit:contain;

    animation:pop .35s ease;
}

@media (min-width:768px){
    .coin{
        width:90px;
        height:90px;
    }
}

@keyframes pop{
    from{
        transform:scale(0);
    }
    to{
        transform:scale(1);
    }
}

.coin.fall{
    animation:fallAway 2s ease-in forwards;
}

@keyframes fallAway{
    to{
        transform:
            translateY(120vh)
            rotate(1080deg);

        opacity:0;
    }
}

#message{
    margin-top:20px;
    padding:0 15px;
    font-size:clamp(1.3rem,4vw,2rem);
    color:yellow;
    text-shadow:2px 2px black;
}

#winnerBanner{
    position:fixed;

    top:-250px;
    left:50%;
    transform:translateX(-50%);

    width:min(90vw,700px);

    background:#ffd700;
    color:#c62828;

    font-weight:bold;

    font-size:clamp(2rem,8vw,4rem);

    padding:20px;

    border:6px solid black;
    border-radius:20px;

    text-shadow:2px 2px white;
    z-index:1000;
}

#winnerBanner.show{
    animation:bannerDrop 1s ease-out forwards;
}

@keyframes bannerDrop{

    0%{
        top:-250px;
    }

    70%{
        top:70px;
    }

    85%{
        top:55px;
    }

    100%{
        top:65px;
    }
}

.ground{
    position:fixed;
    bottom:0;
    width:100%;
    height:60px;

    background:#8B4513;
    border-top:6px solid #5d2d0c;
}

</style>
</head>

<body>

<h1>🍄 Münz-Digitalisierer 🍄</h1>

<button onclick="scanCoin()">
🪙 Münze digitalisieren
</button>

<div id="coins"></div>

<div id="message"></div>

<div id="winnerBanner">
🏆 GEWONNEN! 🏆
</div>

<div class="ground"></div>

<script>

let count = 0;
const maxCoins = 9;

function scanCoin(){

    if(count >= maxCoins){
        return;
    }

    count++;

    const coin = document.createElement("img");

    coin.src = "coin.png";
    coin.alt = "Mario Münze";
    coin.className = "coin";

    document
        .getElementById("coins")
        .appendChild(coin);

    if(count === maxCoins){

        document.getElementById("message").innerHTML =
            "⭐ Alle 9 Münzen digitalisiert! ⭐";

        setTimeout(startVictorySequence,1000);
    }
}

function startVictorySequence(){

    const coins =
        document.querySelectorAll(".coin");

    coins.forEach((coin,index)=>{

        setTimeout(()=>{

            coin.classList.add("fall");

        },index * 150);

    });

    setTimeout(()=>{

        document
            .getElementById("winnerBanner")
            .classList.add("show");

        document.getElementById("message").innerHTML =
            "🎉 Das Portal wurde aktiviert! 🎉<br><br><strong>GEWONNEN!</strong>";

    },1800);
}

</script>

</body>
</html>
